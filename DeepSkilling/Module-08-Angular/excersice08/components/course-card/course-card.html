<div
  appHighlight="lightyellow"
  (click)="openDetails()"
  style="cursor: pointer;">

  <h3>{{ course.name }}</h3>

  <p>Code: {{ course.code }}</p>

  <p>Credits: {{ course.credits | creditLabel }}</p>

  <p>Status: {{ course.gradeStatus }}</p>

  <button
    (click)="$event.stopPropagation(); toggleEnrollment()">

    {{
      enrollmentService.isEnrolled(course.id)
      ? 'Unenroll'
      : 'Enroll'
    }}

  </button>

</div>

<hr>
