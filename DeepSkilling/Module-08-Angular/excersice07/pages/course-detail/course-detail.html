<div *ngIf="course">

    <h2>{{ course.name }}</h2>

    <p><strong>Code:</strong> {{ course.code }}</p>

    <p><strong>Credits:</strong> {{ course.credits }}</p>

    <p><strong>Grade Status:</strong> {{ course.gradeStatus }}</p>

</div>

<div *ngIf="!course">

    <h2>Course not found.</h2>

</div>
