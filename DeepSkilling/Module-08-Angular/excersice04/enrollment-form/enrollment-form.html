<h2>Student Enrollment Request</h2>

<form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)">

  <div>
    <label>Student Name</label><br>

    <input
      type="text"
      name="studentName"
      [(ngModel)]="studentName"
      required
      minlength="3"
      #nameCtrl="ngModel">

    <div *ngIf="nameCtrl.touched">

      <span *ngIf="nameCtrl.errors?.['required']">
        Name is required
      </span>

      <span *ngIf="nameCtrl.errors?.['minlength']">
        Name must be at least 3 characters
      </span>

    </div>
  </div>

  <br>

  <div>
    <label>Student Email</label><br>

    <input
      type="email"
      name="studentEmail"
      [(ngModel)]="studentEmail"
      required
      email
      #emailCtrl="ngModel">

    <div *ngIf="emailCtrl.touched">

      <span *ngIf="emailCtrl.errors?.['required']">
        Email is required
      </span>

      <span *ngIf="emailCtrl.errors?.['email']">
        Enter a valid email
      </span>

    </div>
  </div>

  <br>

  <div>
    <label>Course ID</label><br>

    <input
      type="number"
      name="courseId"
      [(ngModel)]="courseId"
      required
      #courseCtrl="ngModel">

    <div *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']">
      Course ID is required
    </div>
  </div>

  <br>

  <div>
    <label>Preferred Semester</label><br>

    <select
      name="preferredSemester"
      [(ngModel)]="preferredSemester"
      required
      #semesterCtrl="ngModel">

      <option value="">Select</option>
      <option value="Odd">Odd</option>
      <option value="Even">Even</option>

    </select>

    <div *ngIf="semesterCtrl.touched && semesterCtrl.errors?.['required']">
      Select a semester
    </div>
  </div>

  <br>

  <div>

    <label>

      <input
        type="checkbox"
        name="agreeToTerms"
        [(ngModel)]="agreeToTerms"
        required
        #termsCtrl="ngModel">

      I agree to the Terms and Conditions

    </label>

    <div *ngIf="termsCtrl.touched && termsCtrl.errors?.['required']">
      You must agree to the terms.
    </div>

  </div>

  <br>

  <button
    type="submit"
    [disabled]="enrollForm.invalid">
    Submit
  </button>

  <button
    type="button"
    (click)="resetForm(enrollForm)">
    Reset
  </button>

</form>

<br>

<div *ngIf="submitted">
  Enrollment request submitted successfully!
</div>
