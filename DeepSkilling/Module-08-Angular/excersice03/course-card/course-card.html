<div
  [ngClass]="cardClasses"
  [ngStyle]="{'border-left':'8px solid ' + borderColor}"
  appHighlight="lightyellow">

  <h3>{{ course.name }}</h3>

  <p>ID: {{ course.id }}</p>

  <p>Code: {{ course.code }}</p>

  <p>Credits: {{ course.credits | creditLabel }}</p>

  <div [ngSwitch]="course.gradeStatus">

    <p *ngSwitchCase="'passed'" style="color:green">
      Passed
    </p>

    <p *ngSwitchCase="'failed'" style="color:red">
      Failed
    </p>

    <p *ngSwitchCase="'pending'" style="color:gray">
      Pending
    </p>

  </div>

  <button (click)="enroll()">
    Enroll
  </button>

  <button (click)="toggleDetails()">
    {{ isExpanded ? 'Hide Details' : 'Show Details' }}
  </button>

  <div *ngIf="isExpanded">
    <hr>
    <p><strong>Course Details</strong></p>
    <p>This is a {{ course.name }} course.</p>
    <p>Course Code: {{ course.code }}</p>
    <p>Credits: {{ course.credits | creditLabel }}</p>
  </div>

</div>
