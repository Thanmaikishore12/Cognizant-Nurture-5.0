<h2>Reactive Enrollment Form</h2>

<form [formGroup]="enrollForm" (ngSubmit)="onSubmit()">

  <label>Student Name</label><br>
  <input type="text" formControlName="studentName">

  <div *ngIf="enrollForm.get('studentName')?.touched &&
              enrollForm.get('studentName')?.errors?.['required']">
    Name is required.
  </div>

  <div *ngIf="enrollForm.get('studentName')?.errors?.['minlength']">
    Minimum 3 characters.
  </div>

  <br><br>

  <label>Email</label><br>
  <input type="email" formControlName="studentEmail">

  <div *ngIf="enrollForm.get('studentEmail')?.pending">
    Checking email...
  </div>

  <div *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']">
    Email already taken.
  </div>

  <br><br>

  <label>Course ID</label><br>
  <input type="text" formControlName="courseId">

  <div *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']">
    Course code starting with XX is not allowed.
  </div>

  <br><br>

  <label>Preferred Semester</label><br>

  <select formControlName="preferredSemester">
    <option value="Odd">Odd</option>
    <option value="Even">Even</option>
  </select>

  <br><br>

  <label>
    <input type="checkbox" formControlName="agreeToTerms">
    Agree to Terms
  </label>

  <br><br>

  <h3>Additional Courses</h3>

  <button type="button" (click)="addCourse()">
    Add Another Course
  </button>

  <br><br>

  <div formArrayName="additionalCourses">

    <div *ngFor="let ctrl of additionalCourses.controls; let i = index">

      <input [formControl]="$any(ctrl)">

      <button
        type="button"
        (click)="removeCourse(i)">
        Remove
      </button>

      <br><br>

    </div>

  </div>

  <button
    type="submit"
    [disabled]="enrollForm.invalid">
    Submit
  </button>

</form>
